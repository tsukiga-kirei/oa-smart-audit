version: "3.9"

# 本地开发：启动基础设施 + Go 后端服务，前端在本地运行
# 用法：docker-compose -f docker-compose.dev.yml up -d

services:
  go-service:
    build:
      context: .
      dockerfile: go-service/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_DBNAME=oa_smart_audit
      - DATABASE_USER=oa_admin
      - DATABASE_PASSWORD=changeme_pg_password
      - DATABASE_SSLMODE=disable
      - MIGRATIONS_PATH=/migrations
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - SERVER_PORT=8080
      - JWT_SECRET=dev_jwt_secret_change_me
      - ENCRYPTION_KEY=4f9e2b8c5a1d7f0e3a6c9b2d5e8f1a4c
      # 开发环境日志：debug 级别，写入容器内 /app/logs
      - LOG_LEVEL=debug
      - LOG_DIR=/app/logs
      - LOG_MAX_SIZE_MB=50
      - LOG_MAX_BACKUPS=0
      - LOG_COMPRESS=false
      - LOG_GLOBAL_RETENTION_DAYS=7
      # 时区设置，影响日志时间戳显示
      - TZ=Asia/Shanghai
    volumes:
      # 将日志挂载到宿主机，方便本地查看
      - go_logs_dev:/app/logs
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=oa_smart_audit
      - POSTGRES_USER=oa_admin
      - POSTGRES_PASSWORD=changeme_pg_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oa_admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  # 开发环境日志持久化卷
  go_logs_dev:
