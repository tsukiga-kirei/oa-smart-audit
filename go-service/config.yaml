server:
  port: 8080

database:
  host: localhost
  port: 5432
  user: oa_admin
  password: changeme_pg_password
  dbname: oa_smart_audit
  sslmode: disable
  max_open_conns: 50
  max_idle_conns: 10

# 启动时执行 db/migrations 下 SQL，版本记录在表 schema_migrations（golang-migrate）
# path 留空时按工作目录尝试 db/migrations、../db/migrations、../../db/migrations；Docker 环境变量 MIGRATIONS_PATH=/migrations
migrations:
  enabled: true
  path: ""

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "change-me-in-production"
  access_token_ttl: 2h
  refresh_token_ttl: 168h

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

encryption:
  key: "4f9e2b8c5a1d7f0e3a6c9b2d5e8f1a4c" # 必须为 32 字节（AES-256）

# 缓存配置
cache:
  enabled: true
  default_ttl: 5m
  hit_rate_threshold: 0.5
  ttl:
    audit_todo: 3m
    archive_list: 5m
    process_config: 10m
    snapshot: 5m
    stats: 5m
    dashboard: 2m

# 日志系统配置
log:
  # 日志输出等级：debug / info / warn / error，默认 info
  level: "info"
  # 日志文件根目录，全局日志写入 {dir}/app.log，租户日志写入 {dir}/tenants/{code}/tenant.log
  dir: "logs"
  # 单个日志文件最大体积（MB），超出后触发轮转，默认 100
  max_size_mb: 100
  # 轮转后最多保留的备份文件数量。
  # 设为 0（默认）表示不限数量，完全由 system_configs 表中的天数配置控制保留量。
  # 若日志写入量极大（担心短时间内磁盘被撑爆），可设为正整数作为数量上限保护。
  max_backups: 0
  # 是否对轮转备份文件进行 gzip 压缩，默认 true
  compress: true
  # 全局日志文件保留天数（兜底值），优先读取 system_configs 表中的配置，默认 30
  global_retention_days: 30
